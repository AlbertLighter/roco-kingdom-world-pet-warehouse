<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国：世界 繁育中心</title>
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        .container {
            display: flex;
            height: calc(100vh - 80px);
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #fff;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f4f7f6;
        }

        .sidebar h3 {
            margin-top: 0;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .form-group select, .form-group input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .talent-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .talent-grid label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .recommend-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1em;
            margin-top: 10px;
        }

        .recommend-btn:hover {
            background-color: #2980b9;
        }

        .recommendation-pair {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            border: 1px solid #eee;
            flex-wrap: wrap;
        }

        .pair-info {
            width: 100%;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
            display: flex;
            justify-content: space-between;
        }

        .pet-card-wrapper {
            flex: 1;
            min-width: 300px;
        }

        .pet-card-wrapper h4 {
            text-align: center;
            margin-top: 0;
            color: #7f8c8d;
        }

        .nav-links {
            margin-bottom: 20px;
        }

        .nav-links a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>洛克王国：世界 繁育中心</h1>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="nav-links">
                <a href="index.html">← 返回宠物仓库</a>
            </div>
            <h3>繁育配置</h3>
            
            <div class="form-group">
                <label for="targetPetSelect">目标精灵</label>
                <input type="text" id="targetSearch" placeholder="搜索目标精灵..." style="margin-bottom: 5px; width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                <select id="targetPetSelect">
                    <option value="">选择目标精灵...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="natureSelect">期望性格</label>
                <select id="natureSelect">
                    <option value="">选择期望性格...</option>
                </select>
            </div>

            <div class="form-group">
                <label>期望天赋 (必选优秀)</label>
                <div id="talentChecks" class="talent-grid">
                    <label><input type="checkbox" value="hp"> 生命</label>
                    <label><input type="checkbox" value="adAttack"> 物攻</label>
                    <label><input type="checkbox" value="apAttack"> 魔攻</label>
                    <label><input type="checkbox" value="adDefense"> 物防</label>
                    <label><input type="checkbox" value="apDefense"> 魔防</label>
                    <label><input type="checkbox" value="speed"> 速度</label>
                </div>
            </div>

            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="useKingBall"> 使用国王球契约
                </label>
                <select id="kingBallAttr" style="margin-top: 5px;">
                    <option value="hp">锁定生命</option>
                    <option value="adAttack">锁定物攻</option>
                    <option value="apAttack">锁定魔攻</option>
                    <option value="adDefense">锁定物防</option>
                    <option value="apDefense">锁定魔防</option>
                    <option value="speed">锁定速度</option>
                </select>
            </div>

            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 5px; color: #e67e22; font-weight: bold;">
                    <input type="checkbox" id="breedBigSize"> 倾向培养大块头
                </label>
                <p style="font-size: 0.75em; color: #7f8c8d; margin-top: 5px;">(优先推荐体型接近上限的父母)</p>
            </div>

            <button id="recommendBtn" class="recommend-btn">开始推荐</button>

            <div class="history-section" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                <h3 style="display: flex; justify-content: space-between; align-items: center;">
                    历史配置
                    <button id="clearHistoryBtn" style="font-size: 0.6em; background: none; border: 1px solid #ccc; color: #7f8c8d; cursor: pointer; padding: 2px 5px; border-radius: 3px;">清空</button>
                </h3>
                <div id="historyList" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- 历史记录项将在这里动态生成 -->
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div id="recommendationResults">
                <!-- 推荐结果将在这里显示 -->
                <div style="text-align: center; color: #95a5a6; margin-top: 100px;">
                    <h2>配置左侧参数并点击“开始推荐”</h2>
                    <p>系统将为您在仓库中匹配最佳的父母组合</p>
                </div>
            </div>
        </main>
    </div>

    <script src="breeding.js?v=2"></script>
</body>
</html>
